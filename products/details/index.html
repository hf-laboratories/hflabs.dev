<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HF Labs Product Details</title>
    <meta name="description" content="Detailed product descriptions for HF Labs projects." />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="/assets/product-details.js" defer></script>
  </head>
  <body>
    <header class="site-header compact">
      <div class="container center">
        <img
          class="brand-logo small"
          src="/assets/hf-labs-logo.png"
          alt="HF Laboratories logo"
          loading="eager"
          decoding="async"
        />
        <h1>Product Details</h1>
        <nav class="nav-links" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/papers/">Papers</a>
          <a href="/products/">Products</a>
          <a href="/wiki/">Docs</a>
          <a href="/inquiry/">Inquiry</a>
        </nav>
      </div>
    </header>

    <main class="container inquiry-layout">
      <p class="products-state loading" data-detail-state aria-live="polite">Loading product details…</p>
      <section data-product-detail></section>
      <noscript>
        <p class="empty-note">JavaScript is required to load product details on this page.</p>
      </noscript>
    </main>

    <footer class="site-footer">
      <div class="container center">
        <p>© HF Labs</p>
      </div>
    </footer>
  </body>
</html>
