<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HF Labs Wiki</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #0b1220; color: #e5e7eb; }
        header { padding: 16px 20px; background: #111827; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 12px; }
        header h1 { margin: 0; font-size: 18px; }
        .container { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 58px); }
        nav { border-right: 1px solid #1f2937; padding: 12px; background: #0f172a; overflow: auto; }
        nav h2 { font-size: 14px; margin: 8px 0 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; }
        nav ul { list-style: none; margin: 0; padding: 0; }
        nav li { margin: 6px 0; }
        nav a { color: #93c5fd; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        main { padding: 24px; overflow: auto; }
        .muted { color: #9ca3af; font-size: 13px; }
        .error { color: #fca5a5; }
        .toolbar { display: flex; gap: 8px; margin-left: auto; }
        input[type="text"] { background: #0b1220; border: 1px solid #374151; color: #e5e7eb; padding: 8px 10px; border-radius: 8px; width: 360px; }
        button { background: #2563eb; color: #fff; border: 0; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        button.secondary { background: #374151; }
        pre code { white-space: pre-wrap; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #374151; padding: 6px 8px; }
        th { background: #111827; }
        a.external::after { content: " ↗"; font-size: 0.85em; }
    </style>
</head>
<body>
<header>
    <h1>HF Labs Wiki</h1>
    <span class="muted">Markdown docs from this repo</span>
    <div class="toolbar">
        <input id="pageInput" type="text" placeholder="/docs/index.md" />
        <button id="loadBtn">Load</button>
        <button id="homeBtn" class="secondary">Home</button>
    </div>
</header>
<div class="container">
    <nav>
        <h2>Pages</h2>
        <ul id="navList">
            <li><a href="?page=/docs/index.md">Home</a></li>
            <li><a href="?page=/docs/benchmarks/swarm-bench-high-scores-v6-merged.md">Swarm Bench High Scores</a></li>
            <li><a href="?page=/docs/releases/index.md">Releases</a></li>
        </ul>
        <p class="muted">Add links in <code>/docs/index.md</code> for richer navigation.</p>
    </nav>
    <main>
        <div id="status" class="muted">Loading…</div>
        <article id="content"></article>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>
    const DEFAULT_PAGE = '/docs/index.md';
    const pageInput = document.getElementById('pageInput');
    const loadBtn = document.getElementById('loadBtn');
    const homeBtn = document.getElementById('homeBtn');
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');

    function getPageFromQuery() {
        const p = new URLSearchParams(location.search).get('page');
        return p || DEFAULT_PAGE;
    }

    function setPageQuery(page) {
        const u = new URL(location.href);
        u.searchParams.set('page', page);
        history.replaceState(null, '', u);
    }

    function normalizePagePath(path) {
        if (!path) return DEFAULT_PAGE;
        if (!path.startsWith('/')) path = '/' + path;
        // Only allow docs folder markdown files
        if (!path.startsWith('/docs/')) return DEFAULT_PAGE;
        if (!path.endsWith('.md')) return DEFAULT_PAGE;
        return path;
    }

    function resolveRelativeLink(currentPage, href) {
        try {
            if (!href) return null;
            if (/^(https?:)?\/\//i.test(href)) return href;
            if (href.startsWith('#')) return href;

            // Convert wiki query links already in desired format
            if (href.startsWith('?page=')) return href;

            // Resolve relative markdown link against current page
            const base = currentPage.substring(0, currentPage.lastIndexOf('/') + 1);
            const merged = new URL(href, 'https://local' + base).pathname;
            if (merged.startsWith('/docs/') && merged.endsWith('.md')) {
                return '?page=' + merged;
            }
            return href;
        } catch {
            return href;
        }
    }

    async function loadPage(rawPath) {
        const page = normalizePagePath(rawPath);
        pageInput.value = page;
        setPageQuery(page);
        statusEl.textContent = 'Loading ' + page + ' …';
        contentEl.innerHTML = '';

        try {
            const resp = await fetch(page, { cache: 'no-store' });
            if (!resp.ok) throw new Error('HTTP ' + resp.status + ' for ' + page);
            const md = await resp.text();

            // Render markdown
            const html = marked.parse(md, { mangle: false, headerIds: true });
            const safe = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
            contentEl.innerHTML = safe;

            // Rewrite links
            contentEl.querySelectorAll('a').forEach(a => {
                const href = a.getAttribute('href') || '';
                const resolved = resolveRelativeLink(page, href);
                if (!resolved) return;
                a.setAttribute('href', resolved);
                if (/^(https?:)?\/\//i.test(resolved)) {
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.classList.add('external');
                }
            });

            statusEl.textContent = page;
        } catch (err) {
            statusEl.innerHTML = '<span class="error">Failed to load page: ' + (err?.message || err) + '</span>';
        }
    }

    loadBtn.addEventListener('click', () => loadPage(pageInput.value.trim()));
    homeBtn.addEventListener('click', () => loadPage(DEFAULT_PAGE));
    pageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadPage(pageInput.value.trim());
    });

    loadPage(getPageFromQuery());
</script>
</body>
</html>
